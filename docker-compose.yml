services:
  doc-watcher:
    build: .
    container_name: doc-watcher
    volumes:
      - ${PROJECT_PATH:-.}:/project:ro
      - ./output:/app/output
      - ./config.yaml:/app/config.yaml:ro
    ports:
      - "${DOC_WATCHER_PORT:-8080}:8080"
    environment:
      - DOC_WATCHER_PROJECT_PATH=/project
      - DOC_WATCHER_OUTPUT_PATH=/app/output
      - DOC_WATCHER_PORT=8080
    restart: unless-stopped
