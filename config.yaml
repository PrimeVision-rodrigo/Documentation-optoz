# Documentation Watcher — Configuration
# Point this at any project directory to auto-generate documentation.
#
# All fields are optional. If left empty, the watcher auto-detects
# project structure, languages, and frameworks.

# Project to analyze (can also be set via CLI arg or DOC_WATCHER_PROJECT_PATH env var)
project_path: /project

# Where to write generated docs (can also be set via --output or DOC_WATCHER_OUTPUT_PATH)
output_path: /app/output

# Project name override (auto-detected from package.json / pyproject.toml if empty)
project_name: ""

# Port to serve the dashboard on (set via --port, DOC_WATCHER_PORT, or here)
# Leave empty to disable the HTTP server
# port: 8080

# How often to flush accumulated changes to docs
flush_interval_seconds: 900  # 15 minutes

# Polling interval for file change detection (seconds)
poll_interval_seconds: 3

# Patterns to exclude from watching
watch_excludes:
  - "__pycache__"
  - ".git"
  - ".venv"
  - "venv"
  - "node_modules"
  - "*.log"
  - "*.pyc"
  - ".DS_Store"
  - "dist"
  - "build"
  - ".next"

# Domain classification rules: pattern → domain name
# Leave empty for auto-detection from directory structure
domain_rules: {}

# Per-document trigger patterns
# Leave empty for auto-detection based on discovered project structure
architecture_patterns: []
dataflow_patterns: []
audit_patterns: []
visual_patterns: []
